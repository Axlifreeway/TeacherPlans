name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ./teacherfactory

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.4"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: teacherfactory/.venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('teacherfactory/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install project
        run: poetry install --no-interaction --only-root

      - name: Ruff lint
        run: poetry run ruff check src tests

      - name: Ruff format check
        run: poetry run ruff format --check src tests

      - name: Mypy
        run: poetry run mypy src/teacherfactory

      - name: Pytest + coverage
        run: poetry run pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=65

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: teacherfactory/coverage.xml

  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
