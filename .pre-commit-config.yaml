# Установка хуков:
#   poetry run pre-commit install
# Прогон по всем файлам вручную:
#   poetry run pre-commit run --all-files

repos:
  # Базовая гигиена
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  # Утечки секретов — главный страховочный слой
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Lint + автоформатирование импортов
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type checks (только на изменённые .py файлы для скорости)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^teacherfactory/src/
        additional_dependencies:
          - pydantic>=2.13
        args: [--config-file=teacherfactory/pyproject.toml]
