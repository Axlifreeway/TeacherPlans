# Пример конфигурации Groq API.
# Скопируй секцию [groq] в config.local.toml и подставь свой ключ.

[groq]
# Получить ключ бесплатно: https://console.groq.com/keys
api_key = "gsk_..."

# Актуальные модели Groq (сверяйся с https://console.groq.com/docs/models):
#   - llama-3.1-8b-instant         — быстрая, дефолт
#   - llama-3.3-70b-versatile      — мощная (медленнее)
#   - gemma2-9b-it                 — Google Gemma 2 9B
#   - deepseek-r1-distill-llama-70b — рассуждающая модель
model = "llama-3.1-8b-instant"

# Лимиты Free Tier (RPM/RPD/TPM/TPD) меняются и зависят от модели.
# Актуальные числа: https://console.groq.com/docs/rate-limits
